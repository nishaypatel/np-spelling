<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spelling Stars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" id="theme-css" href="styles/themes.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="theme-lionking">

  <!-- ── SCREEN: Login ── -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="login-mascot" id="login-mascot"></div>
      <h1 class="login-title">Spelling Stars</h1>
      <p class="login-sub">Weekly spelling practice</p>
      <button id="btn-signin" class="btn btn-primary btn-xl">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:8px"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ── SCREEN: Home ── -->
  <div id="screen-home" class="screen hidden">
    <header class="app-header">
      <div class="header-mascot" id="home-mascot"></div>
      <div class="header-info">
        <h1 class="header-title">Spelling Stars</h1>
        <p class="header-week" id="header-week-label">This week's words</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-settings" title="Settings">⚙️</button>
        <button class="icon-btn" id="btn-signout" title="Sign out">👋</button>
      </div>
    </header>

    <div class="home-body">
      <div id="no-words-notice" class="notice hidden">
        <p>No words loaded yet.</p>
        <button class="btn btn-primary" id="btn-goto-enter">Enter this week's words</button>
      </div>

      <div id="word-chips" class="word-chips"></div>

      <div id="activity-grid" class="activity-grid hidden">
        <button class="activity-card" data-activity="hear-write">
          <span class="ac-icon">👂</span>
          <span class="ac-label">Hear &amp; Write</span>
          <span class="ac-desc">Listen and spell the word</span>
        </button>
        <button class="activity-card" data-activity="missing-letters">
          <span class="ac-icon">🔡</span>
          <span class="ac-label">Missing Letters</span>
          <span class="ac-desc">Fill in the gaps</span>
        </button>
        <button class="activity-card" data-activity="fix-mistake">
          <span class="ac-icon">🔍</span>
          <span class="ac-label">Fix the Mistake</span>
          <span class="ac-desc">Spot the correct spelling</span>
        </button>
        <button class="activity-card" data-activity="test-mode">
          <span class="ac-icon">📝</span>
          <span class="ac-label">Spelling Test</span>
          <span class="ac-desc">Just like school!</span>
        </button>
        <button class="activity-card ac-parent" id="btn-enter-words">
          <span class="ac-icon">✏️</span>
          <span class="ac-label">Change Words</span>
          <span class="ac-desc">Enter this week's list</span>
        </button>
        <button class="activity-card ac-parent" id="btn-dashboard">
          <span class="ac-icon">📊</span>
          <span class="ac-label">Progress</span>
          <span class="ac-desc">See how you're doing</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: Word Entry ── -->
  <div id="screen-word-entry" class="screen hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-back-from-entry">←</button>
      <h1 class="header-title">This Week's Words</h1>
    </header>
    <div class="entry-body">
      <p class="entry-hint">Type all 8 spelling words then tap <strong>Save &amp; Generate</strong>.</p>
      <div class="word-entry-grid" id="word-entry-grid">
        <!-- 8 inputs injected by JS -->
      </div>
      <div id="entry-status" class="entry-status hidden"></div>
      <button class="btn btn-primary btn-xl" id="btn-save-words">Save &amp; Generate ✨</button>
    </div>
  </div>

  <!-- ── SCREEN: Activity ── -->
  <div id="screen-activity" class="screen hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-back-from-activity">←</button>
      <h1 class="header-title" id="activity-title">Activity</h1>
      <div class="progress-pill" id="progress-pill">1 / 8</div>
    </header>
    <div class="activity-body" id="activity-body">
      <!-- Injected by activities.js -->
    </div>
  </div>

  <!-- ── SCREEN: Test Results ── -->
  <div id="screen-results" class="screen hidden">
    <div class="results-wrap">
      <div class="results-mascot" id="results-mascot"></div>
      <h2 class="results-title" id="results-title">Test Complete!</h2>
      <div class="results-score" id="results-score"></div>
      <div class="results-list" id="results-list"></div>
      <div class="results-actions">
        <button class="btn btn-primary" id="btn-try-again">Try Again</button>
        <button class="btn btn-secondary" id="btn-results-home">Home</button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: Dashboard ── -->
  <div id="screen-dashboard" class="screen hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-back-from-dashboard">←</button>
      <h1 class="header-title">Progress</h1>
    </header>
    <div class="dashboard-body" id="dashboard-body">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- ── SCREEN: Settings ── -->
  <div id="screen-settings" class="screen hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-back-from-settings">←</button>
      <h1 class="header-title">Settings</h1>
    </header>
    <div class="settings-body">
      <h2 class="settings-section-title">Choose Your Theme</h2>
      <div class="theme-grid" id="theme-grid">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/activities.js"></script>
</body>
</html>
